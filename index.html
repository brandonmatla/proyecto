<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca - Login</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="contenedor">

    <div class="login">

        <h1>📚 Biblioteca</h1>

        <p>Iniciar Sesión</p>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
